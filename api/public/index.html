<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f0f0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>🧠 Meu Espaço</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0ede8;--muted:#6e6a65;--accent:#c8b89a;--green:#8fb8a0;--blue:#a8b8d0;--red:#d08080;--yellow:#d0b878;--radius:14px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh}
#header{padding:calc(var(--safe-top) + 48px) 20px 14px;background:#141414;border-bottom:1px solid var(--border);flex-shrink:0}
.hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.htitle{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);line-height:1.1}
.hdate{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.04em}
#rbtn{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px}
#rbtn svg{width:15px;height:15px}
#rbtn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 14px 11px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:var(--surface2);color:var(--muted);font-size:10px;border-radius:99px;font-weight:700}
.tab.active .badge{background:rgba(200,184,154,.15);color:var(--accent)}
#content{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:calc(24px + var(--safe-bottom))}
.frow{display:flex;gap:7px;padding:14px 16px 10px;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;background:var(--bg);z-index:2;border-bottom:1px solid var(--border)}
.frow::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s;letter-spacing:.02em}
.chip.on{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.glabel{padding:16px 16px 6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.tlist{padding:0 12px;display:flex;flex-direction:column;gap:7px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:transform .12s,background .12s;user-select:none}
.tcard:active{transform:scale(.975);background:var(--surface2)}
.tcard.done{opacity:.38}
.tcard.updating{pointer-events:none;opacity:.6}
.chk{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.tcard.done .chk{background:var(--green);border-color:var(--green)}
.chkico{width:11px;height:11px;opacity:0;transition:opacity .15s}
.tcard.done .chkico{opacity:1}
.tbody{flex:1;min-width:0}
.tname{font-size:14px;color:var(--text);line-height:1.45;word-break:break-word}
.tcard.done .tname{text-decoration:line-through;color:var(--muted)}
.tmeta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.02em}
.tp-a{background:rgba(208,128,128,.14);color:var(--red)}
.tp-m{background:rgba(208,184,120,.14);color:var(--yellow)}
.tp-b{background:rgba(143,184,160,.14);color:var(--green)}
.tcat{background:rgba(168,184,208,.1);color:var(--blue)}
.tdate{background:rgba(255,255,255,.05);color:var(--muted)}
.tem{background:rgba(208,184,120,.14);color:var(--yellow)}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:flex-start;gap:12px}
.bsp{width:3px;border-radius:3px;align-self:stretch;flex-shrink:0;min-height:44px}
.sp-l{background:var(--blue)}.sp-f{background:var(--border2)}.sp-c{background:var(--green)}.sp-a{background:var(--red)}
.bbody{flex:1;min-width:0}
.btitle{font-size:14px;font-weight:500;color:var(--text);line-height:1.35}
.bauthor{font-size:12px;color:var(--muted);margin-top:2px}
.bmeta{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.bpill{font-size:10px;padding:2px 9px;border-radius:99px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.bl-l{background:rgba(168,184,208,.14);color:var(--blue)}
.bl-f{background:rgba(255,255,255,.05);color:var(--muted)}
.bl-c{background:rgba(143,184,160,.14);color:var(--green)}
.bl-a{background:rgba(208,128,128,.1);color:var(--red)}
.div{height:1px;background:var(--border);margin:10px 12px 4px}
.sbox{padding:52px 20px;text-align:center;color:var(--muted)}
.sbox .ico{font-size:32px;margin-bottom:12px;opacity:.35}
.sbox p{font-size:13px;line-height:1.7}
.skel{height:68px;background:var(--surface);border-radius:var(--radius);margin:0 12px 7px;animation:pulse 1.3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.7}}
#toast{position:fixed;bottom:calc(18px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(70px);background:#2a2a2a;border:1px solid var(--border2);color:var(--text);font-size:13px;padding:9px 18px;border-radius:99px;white-space:nowrap;transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:200;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hrow">
      <div>
        <div class="htitle">🧠 Meu Espaço</div>
        <div class="hdate" id="hdate">—</div>
      </div>
      <button id="rbtn" onclick="loadAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="tabs">
    <div class="tab active" data-tab="pessoal" onclick="switchTab('pessoal')">Pessoal <span class="badge" id="b-pessoal">·</span></div>
    <div class="tab" data-tab="profissional" onclick="switchTab('profissional')">Profissional <span class="badge" id="b-profissional">·</span></div>
    <div class="tab" data-tab="mensal" onclick="switchTab('mensal')">Mensal <span class="badge" id="b-mensal">·</span></div>
    <div class="tab" data-tab="livros" onclick="switchTab('livros')">Livros <span class="badge" id="b-livros">·</span></div>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>
<script>
const DBS={pessoal:'d3cdba3944474bfebed1eecdce491d02',profissional:'859cdfec720547a1bdcb4bb384f0c9b2',mensal:'8fe94e12df1645c291a8be8f2218e0fb',livros:'04fd8fec7a7d456897a28aa24737c71f'};
const TK={pessoal:'Tarefa',profissional:'Tarefa',livros:'Título'};
const CK={pessoal:'Categoria',profissional:'Área',mensal:'Área'};
let data={},tab='pessoal',fil={pessoal:'pendentes',profissional:'pendentes',mensal:'pendentes',livros:'todos'};

async function nQ(dbId,body={}){
  const r=await fetch(`/api/databases/${dbId}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function nP(pageId,properties){
  const r=await fetch(`/api/pages/${pageId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({properties})});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
function gp(props,key){
  const p=props?.[key];if(!p)return null;
  if(p.type==='title')return p.title?.map(t=>t.plain_text).join('')||'';
  if(p.type==='rich_text')return p.rich_text?.map(t=>t.plain_text).join('')||'';
  if(p.type==='select')return p.select?.name||null;
  if(p.type==='date')return p.date?.start||null;
  if(p.type==='checkbox')return p.checkbox;
  return null;
}
function tk(t){if(TK[t])return TK[t];const i=data[t];if(!i?.length)return'Nome';return Object.keys(i[0].properties).find(k=>i[0].properties[k].type==='title')||'Nome';}
function fd(d){if(!d)return null;return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pc(key){const i=data[key];if(!i)return'·';if(key==='livros')return i.filter(x=>gp(x.properties,'Status')==='Lendo').length;return i.filter(x=>gp(x.properties,'Status')!=='Concluído').length;}

async function loadAll(){
  const btn=document.getElementById('rbtn');btn.classList.add('spinning');showSkel();
  try{
    const keys=Object.keys(DBS);
    const res=await Promise.all(keys.map(k=>nQ(DBS[k])));
    keys.forEach((k,i)=>{data[k]=res[i].results;});
    updateBadges();renderTab(tab);
    document.getElementById('hdate').textContent='Atualizado · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('content').innerHTML='<div class="sbox"><div class="ico">⚠️</div><p>Erro ao conectar.<br>Verifique sua conexão.</p></div>';
  }
  btn.classList.remove('spinning');
}
function updateBadges(){['pessoal','profissional','mensal','livros'].forEach(k=>{document.getElementById('b-'+k).textContent=pc(k);});}
function showSkel(){document.getElementById('content').innerHTML='<div style="height:14px"></div>'+[1,2,3,4,5].map(()=>'<div class="skel"></div>').join('');}
function switchTab(t){tab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));renderTab(t);}

function renderTab(t){
  if(t==='livros'){renderLivros();return;}
  const items=data[t],content=document.getElementById('content');
  if(!items){showSkel();return;}
  const ttk=tk(t),ck=CK[t]||'Categoria',f=fil[t];
  const cats=[...new Set(items.map(i=>gp(i.properties,ck)).filter(Boolean))];
  let filtered=items;
  if(f==='pendentes')filtered=items.filter(i=>gp(i.properties,'Status')!=='Concluído');
  else if(f==='concluidos')filtered=items.filter(i=>gp(i.properties,'Status')==='Concluído');
  else if(f==='andamento')filtered=items.filter(i=>gp(i.properties,'Status')==='Em andamento');
  else if(f!=='todos')filtered=items.filter(i=>gp(i.properties,ck)===f);
  const so={'A fazer':0,'Em andamento':1,'Concluído':2};
  filtered=[...filtered].sort((a,b)=>(so[gp(a.properties,'Status')]??0)-(so[gp(b.properties,'Status')]??0));
  const pend=filtered.filter(i=>gp(i.properties,'Status')!=='Concluído');
  const done=filtered.filter(i=>gp(i.properties,'Status')==='Concluído');
  let html=`<div class="frow">${chip(t,'todos',f,'Todos')}${chip(t,'pendentes',f,'Pendentes')}${chip(t,'andamento',f,'Em andamento')}${chip(t,'concluidos',f,'Concluídos')}${cats.map(c=>chip(t,c,f,c)).join('')}</div>`;
  if(!filtered.length){html+='<div class="sbox"><div class="ico">✓</div><p>Nada aqui.</p></div>';document.getElementById('content').innerHTML=html;return;}
  if(f!=='concluidos'&&pend.length){html+=`<div class="glabel">Pendentes · ${pend.length}</div><div class="tlist">`;pend.forEach(i=>{html+=tcardH(i,ttk,ck,t);});html+='</div>';}
  if(f!=='pendentes'&&f!=='andamento'&&done.length){html+=`<div class="div"></div><div class="glabel">Concluídos · ${done.length}</div><div class="tlist">`;done.forEach(i=>{html+=tcardH(i,ttk,ck,t);});html+='</div>';}
  content.innerHTML=html;content.scrollTo(0,0);
}

function chip(t,val,active,label){return `<button class="chip${active===val?' on':''}" onclick="setFil('${t}','${val}')">${esc(label)}</button>`;}

function tcardH(item,ttk,ck,t){
  const id=item.id,props=item.properties;
  const name=gp(props,ttk)||'(sem título)',status=gp(props,'Status')||'A fazer';
  const prio=gp(props,'Prioridade'),cat=gp(props,ck),date=fd(gp(props,'Data'));
  const done=status==='Concluído',em=status==='Em andamento';
  const pt=prio?`<span class="tag ${prio==='Alta'?'tp-a':prio==='Média'?'tp-m':'tp-b'}">${esc(prio)}</span>`:'';
  const ct=cat?`<span class="tag tcat">${esc(cat)}</span>`:'';
  const dt=date?`<span class="tag tdate">${date}</span>`:'';
  const et=em?'<span class="tag tem">Em andamento</span>':'';
  return `<div class="tcard${done?' done':''}" id="tc-${id}" onclick="toggleTask('${id}','${t}',${done})">
    <div class="chk"><svg class="chkico" viewBox="0 0 11 9" fill="none" stroke="white" stroke-width="2.2"><polyline points="1,4.5 4,7.5 10,1.5"/></svg></div>
    <div class="tbody"><div class="tname">${esc(name)}</div><div class="tmeta">${pt}${et}${ct}${dt}</div></div>
  </div>`;
}

async function toggleTask(id,t,isDone){
  const card=document.getElementById('tc-'+id);
  const ns=isDone?'A fazer':'Concluído';
  if(card){card.classList.add('updating');card.classList.toggle('done',!isDone);}
  try{
    await nP(id,{Status:{select:{name:ns}}});
    const r=await nQ(DBS[t]);data[t]=r.results;
    updateBadges();renderTab(t);
    showToast(isDone?'Reaberto':'Concluído ✓');
  }catch(e){
    if(card){card.classList.remove('updating');card.classList.toggle('done',isDone);}
    showToast('Erro ao atualizar');
  }
}

function renderLivros(){
  const items=data.livros,content=document.getElementById('content');
  if(!items){showSkel();return;}
  const f=fil.livros;
  const sm={lendo:'Lendo',fila:'Na fila',concluido:'Concluído',abandonado:'Abandonado'};
  let filtered=items;
  if(f!=='todos')filtered=items.filter(i=>gp(i.properties,'Status')===(sm[f]||f));
  const order=['Lendo','Na fila','Concluído','Abandonado'];
  filtered=[...filtered].sort((a,b)=>order.indexOf(gp(a.properties,'Status'))-order.indexOf(gp(b.properties,'Status')));
  let html=`<div class="frow">${chip('livros','todos',f,'Todos')}${chip('livros','lendo',f,'Lendo')}${chip('livros','fila',f,'Na fila')}${chip('livros','concluido',f,'Concluídos')}</div>`;
  if(!filtered.length){html+='<div class="sbox"><div class="ico">📚</div><p>Nenhum livro aqui.</p></div>';content.innerHTML=html;return;}
  const groups={};
  filtered.forEach(item=>{const s=gp(item.properties,'Status')||'Na fila';(groups[s]=groups[s]||[]).push(item);});
  order.forEach(status=>{
    if(!groups[status])return;
    html+=`<div class="glabel">${esc(status)} · ${groups[status].length}</div><div class="tlist">`;
    groups[status].forEach(item=>{
      const title=gp(item.properties,'Título')||'(sem título)';
      const author=gp(item.properties,'Autor')||'';
      const genre=gp(item.properties,'Gênero')||'';
      const rating=gp(item.properties,'Avaliação')||'';
      const s=gp(item.properties,'Status')||'Na fila';
      const sc=s==='Lendo'?'sp-l':s==='Concluído'?'sp-c':s==='Abandonado'?'sp-a':'sp-f';
      const pc2=s==='Lendo'?'bl-l':s==='Concluído'?'bl-c':s==='Abandonado'?'bl-a':'bl-f';
      html+=`<div class="bcard"><div class="bsp ${sc}"></div><div class="bbody"><div class="btitle">${esc(title)}</div><div class="bauthor">${esc(author)}</div><div class="bmeta"><span class="bpill ${pc2}">${esc(s)}</span>${genre?`<span class="tag tcat">${esc(genre)}</span>`:''}${rating?`<span class="tag tdate">${rating}</span>`:''}</div></div></div>`;
    });
    html+='</div><div style="height:6px"></div>';
  });
  content.innerHTML=html;content.scrollTo(0,0);
}

function setFil(t,v){fil[t]=v;renderTab(t);}
let _tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2000);}
document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
loadAll();
</script>
</body>
</html>
